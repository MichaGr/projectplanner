services:
  project-planner:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4173:80"
    depends_on:
      workflow-service:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: projectplanner
      POSTGRES_USER: projectplanner
      POSTGRES_PASSWORD: projectplanner
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectplanner -d projectplanner"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  workflow-service:
    build:
      context: ./workflow_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://projectplanner:projectplanner@postgres:5432/projectplanner
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /login {
    try_files /login.html =404;
  }

  location = /favicon.svg {
    try_files $uri =404;
  }

  location = /api/health {
    proxy_pass http://workflow-service:8000/api/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/auth/login {
    proxy_pass http://workflow-service:8000/api/auth/login;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/auth/logout {
    proxy_pass http://workflow-service:8000/api/auth/logout;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/auth/session {
    proxy_pass http://workflow-service:8000/api/auth/session;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    auth_request /api/auth/session;
    proxy_pass http://workflow-service:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    auth_request /api/auth/session;
    error_page 401 = @login_redirect;
    try_files $uri $uri/ /index.html;
  }

  location @login_redirect {
    return 302 $scheme://$http_host/login?next=$request_uri;
  }
}

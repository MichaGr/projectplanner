<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Planner Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(246, 184, 135, 0.18), transparent 35%),
          linear-gradient(180deg, #0b1118 0%, #080c12 100%);
        color: #e5edf6;
      }
      .login-card {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(216, 180, 254, 0.16);
        border-radius: 18px;
        background: rgba(16, 21, 29, 0.96);
        padding: 28px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        color: #9aa7b5;
        line-height: 1.5;
      }
      form {
        display: grid;
        gap: 14px;
      }
      label {
        display: grid;
        gap: 6px;
        color: #c7d2de;
        font-size: 13px;
        font-weight: 600;
      }
      input {
        width: 100%;
        border: 1px solid rgba(216, 180, 254, 0.14);
        border-radius: 10px;
        background: #0d131b;
        padding: 12px 13px;
        color: #eef4fb;
        font: inherit;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: #f6b887;
        padding: 12px 14px;
        color: #25160a;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .feedback {
        min-height: 20px;
        color: #fd8b9c;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1>Project Planner</h1>
      <p>Sign in to access the planner workspace.</p>
      <form id="login-form">
        <label>
          Username
          <input id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <div id="feedback" class="feedback" aria-live="polite"></div>
        <button id="submit" type="submit">Sign in</button>
      </form>
    </main>
    <script>
      const form = document.getElementById('login-form');
      const feedback = document.getElementById('feedback');
      const submitButton = document.getElementById('submit');
      const nextParam = new URLSearchParams(window.location.search).get('next');
      const nextPath =
        nextParam && nextParam.startsWith('/') && !nextParam.startsWith('//') ? nextParam : '/';

      const showFeedback = (message) => {
        feedback.textContent = message;
      };

      const setLoading = (loading) => {
        submitButton.disabled = loading;
        submitButton.textContent = loading ? 'Signing in...' : 'Sign in';
      };

      fetch('/api/auth/session', { credentials: 'same-origin' }).then((response) => {
        if (response.ok) {
          window.location.replace(nextPath);
        }
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        showFeedback('');
        setLoading(true);

        const payload = {
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        };

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            showFeedback(body.detail || 'Could not sign in.');
            setLoading(false);
            return;
          }

          window.location.replace(nextPath);
        } catch (error) {
          showFeedback('Could not sign in.');
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
